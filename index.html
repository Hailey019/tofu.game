<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>切霉豆腐 Slice Mold Tofu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0e8d0;
      --border: #2a1a08;
      --accent: #c0392b;
      --bamboo: #d8c898;
      --bamboo-dark: #8a7040;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    /* 全局像素风：画布和图片不插值、字体不抗锯齿 */
    canvas, img, .jar, .jar-tofu-canvas, .ending-jar-canvas, .ending-jar-wrap,
    .prop-plate, .prop-bottle, #ladyCanvas, #tofuCanvas {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    body {
      margin: 0;
      padding: 0;
      padding env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .game-root {
      width: 100%;
      max-width: min(390px, 100vw);
      margin: 0 auto;
      padding: 12px 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      image-rendering: pixelated;
      font-smooth: never;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
    }

    .pixel-border {
      border: 3px solid var(--border);
      box-shadow: 0 0 0 2px #f8f1da;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .title {
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 18px;
      text-align: center;
      color: var(--accent);
      margin: 6px 0 10px;
    }

    /* INTRO SCREEN */

    .intro-scene {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      margin-bottom: 10px;
    }

    .intro-bg {
      background: linear-gradient(#7ec9ff 0 55%, #74bdff 55% 65%, #5cb345 65% 100%);
      position: relative;
      padding: 10px;
    }

    .intro-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid var(--border);
      pointer-events: none;
    }

    .sun {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 0;
      background: #ffe26a;
      border: 3px solid #e0a800;
      top: 10px;
      right: 26px;
      image-rendering: pixelated;
    }

    .cloud {
      position: absolute;
      height: 16px;
      background: #ffffff;
      border: 3px solid var(--border);
      border-radius: 0;
      image-rendering: pixelated;
    }

    .cloud.small {
      width: 40px;
      top: 20px;
      left: 20px;
    }

    .cloud.medium {
      width: 60px;
      top: 40px;
      left: 80px;
    }

    .cloud.large {
      width: 80px;
      top: 18px;
      right: 80px;
    }

    .stall {
      position: relative;
      margin: 70px auto 6px;
      width: 88%;
      max-width: 340px;
      image-rendering: pixelated;
    }

    .stall-top {
      height: 18px;
      background: #9c6b33;
      border: 3px solid var(--border);
      border-bottom: none;
    }

    .stall-legs {
      position: relative;
      height: 40px;
      background: #b37a3c;
      border: 3px solid var(--border);
      border-top: none;
    }

    .stall-leg {
      position: absolute;
      width: 10px;
      bottom: -12px;
      background: #7a4c1f;
      border: 3px solid var(--border);
    }

    .stall-leg.left {
      left: 10%;
    }

    .stall-leg.right {
      right: 10%;
    }

    .stall-banner {
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      border: 3px solid var(--border);
      padding: 4px 6px;
      font-size: 10px;
      color: #ffeeda;
      white-space: nowrap;
      font-family: "Press Start 2P", system-ui, sans-serif;
    }

    .lady-canvas-wrap {
      position: absolute;
      bottom: 2px;
      right: 10px;
      left: auto;
      width: 90px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
    }

    #ladyCanvas {
      image-rendering: pixelated;
      background: transparent;
    }

    .lady-shake {
      animation: shake 0.32s steps(2, end) 1;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      50% { transform: translateX(3px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    .swipe-overlay {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none;
      font-family: "Press Start 2P", system-ui, sans-serif;
      color: #ffe;
      font-size: 11px;
    }

    .swipe-overlay.show {
      display: flex;
    }

    .speech-box {
      margin-top: 8px;
      background: #fff7e6;
      border-radius: 0;
      padding: 8px 8px 10px;
      border: 3px solid var(--border);
      position: relative;
      font-size: 13px;
      line-height: 1.4;
    }

    .speech-box::before {
      content: "";
      position: absolute;
      left: 20px;
      top: -10px;
      width: 12px;
      height: 12px;
      background: #fff7e6;
      border-left: 3px solid var(--border);
      border-top: 3px solid var(--border);
      transform: rotate(45deg);
    }

    .speech-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      border: 3px solid var(--border);
      background: #ffeede;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: "Press Start 2P", system-ui, sans-serif;
      color: var(--border);
      border-radius: 0;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #ffeede;
    }

    .btn-danger {
      background: #8b1b13;
      color: #ffeede;
    }

    .btn-full {
      width: 100%;
      text-align: center;
      justify-content: center;
      display: inline-flex;
      align-items: center;
    }

    /* MAIN GAME */

    .score-bar {
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 11px;
      border: 3px solid var(--border);
      padding: 6px 6px 7px;
      background: #fff5de;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .score-section {
      flex: 1;
      text-align: center;
      white-space: nowrap;
    }

    .score-section:first-child {
      text-align: left;
    }

    .score-section:last-child {
      text-align: right;
    }

    .hint-bar {
      font-size: 12px;
      border: 3px solid var(--border);
      padding: 6px 8px;
      background: #fff9e9;
      margin-bottom: 8px;
      text-align: center;
    }

    .tofu-board-wrap {
      margin: 0 auto 12px;
      padding: 12px 4px 6px;
      transform: perspective(700px) rotateX(14deg);
      transform-origin: center top;
    }

    .tofu-board-inner {
      position: relative;
      margin: 0 auto;
      width: 100%;
      max-width: 340px;
      background:
        repeating-linear-gradient(
          90deg,
          var(--bamboo),
          var(--bamboo) 8px,
          #e4d4a0 8px,
          #e4d4a0 16px
        );
      border: 4px solid var(--border);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.15);
      padding: 10px 12px 14px;
      border-radius: 0;
    }

    #tofuCanvas {
      width: 100%;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
      background: transparent;
    }

    .buttons-row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 6px;
    }

    .buttons-row .btn {
      flex: 1;
      text-align: center;
      justify-content: center;
      display: inline-flex;
      align-items: center;
    }

    .popup-score {
      position: absolute;
      pointer-events: none;
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 11px;
      color: #ff4646;
      text-shadow: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: transform 0.4s ease-out, opacity 0.4s ease-out;
    }

    .popup-score.show {
      opacity: 1;
    }

    /* MIXING SCREEN - 腌制阶段 */
    .mix-screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 8px;
    }

    .jar-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .jar {
      width: 180px;
      height: 200px;
      border: 4px solid var(--border);
      border-radius: 0;
      background: rgba(255,255,255,0.35);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.4), 0 0 0 2px rgba(255,255,255,0.5);
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .jar-tofu-canvas {
      position: absolute;
      inset: 20px 12px 12px 12px;
      border-radius: 0;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .jar-noise {
      position: absolute;
      inset: 20px 12px 12px 12px;
      border-radius: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .jar-noise.visible {
      opacity: 1;
    }

    .props-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 10px;
    }

    .prop-item {
      width: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 8px;
      color: var(--border);
    }

    .prop-item:active {
      cursor: grabbing;
    }

    .prop-plate {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-radius: 0;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2px;
      padding: 4px;
      background: #fff9f0;
    }

    .prop-plate .grain {
      width: 4px;
      height: 4px;
      border-radius: 0;
    }

    .prop-plate.chili .grain { background: #c0392b; }
    .prop-plate.salt .grain { background: #fff; border: 1px solid #ddd; }

    .prop-bottle {
      width: 28px;
      height: 56px;
      border: 3px solid var(--border);
      border-radius: 0;
      margin-bottom: 2px;
      background: linear-gradient(180deg, rgba(255,255,255,0.7) 0, rgba(240,248,255,0.5) 100%);
    }

    .mix-actions {
      margin-top: 6px;
    }

    .jar-shake {
      animation: jar-shake 0.6s linear infinite;
    }

    @keyframes jar-shake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      20% { transform: translateX(-4px) rotate(-2deg); }
      40% { transform: translateX(4px) rotate(2deg); }
      60% { transform: translateX(-3px) rotate(-1deg); }
      80% { transform: translateX(3px) rotate(1deg); }
    }

    /* ENDING 结算界面 */
    .ending-screen {
      text-align: center;
      padding: 20px 16px;
    }

    .ending-jar-wrap {
      margin: 0 auto 16px;
      width: 160px;
      height: 180px;
      border: 4px solid var(--border);
      border-radius: 0;
      background: rgba(255,255,255,0.4);
      box-shadow: inset 0 0 25px rgba(255,255,255,0.5);
      position: relative;
      overflow: hidden;
    }

    .ending-jar-canvas {
      position: absolute;
      inset: 16px 10px 10px 10px;
      border-radius: 0;
      image-rendering: pixelated;
    }

    .ending-title {
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .ending-msg {
      font-size: 11px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    @media (max-width: 360px) {
      .title {
        font-size: 16px;
      }
      .score-bar {
        font-size: 10px;
      }
      .btn {
        font-size: 10px;
        padding: 5px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="game-root">
    <!-- Shared Title -->
    <div class="title">✦切霉豆腐✦</div>

    <!-- INTRO SCREEN -->
    <div id="screenIntro" class="screen active">
      <div class="intro-scene pixel-border">
        <div class="intro-bg">
          <div class="sun"></div>
          <div class="cloud small"></div>
          <div class="cloud medium"></div>
          <div class="cloud large"></div>

          <div class="stall">
            <div class="stall-banner">正宗霉豆腐 新鲜现做</div>
            <div class="stall-top"></div>
            <div class="stall-legs">
              <div class="stall-leg left"></div>
              <div class="stall-leg right"></div>
            </div>
            <div class="lady-canvas-wrap">
              <canvas id="ladyCanvas" width="64" height="96"></canvas>
            </div>
          </div>

          <div id="swipeOverlay" class="swipe-overlay">
            <span>一巴掌呼过来！</span>
          </div>
        </div>
      </div>

      <div class="speech-box">
        <div id="speechText"></div>
        <div id="speechButtons" class="speech-buttons">
          <button id="btnTouch" class="btn">摸摸看</button>
          <button id="btnBuy" class="btn btn-primary">当然买！</button>
        </div>
      </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="screenGame" class="screen">
      <div class="score-bar">
        <div id="cutInfo" class="score-section">切了: 0/12</div>
        <div id="scoreInfo" class="score-section">★ 0</div>
        <div id="lifeInfo" class="score-section">♥♥♥</div>
      </div>

      <div class="title">✦切霉豆腐✦</div>

      <div id="hintBar" class="hint-bar">
        用手划过缝隙来切！
      </div>

      <div class="tofu-board-wrap">
        <div class="tofu-board-inner pixel-border">
          <canvas id="tofuCanvas" width="320" height="220"></canvas>
          <div id="popupScore" class="popup-score">+20</div>
        </div>
      </div>

      <div class="buttons-row">
        <button id="btnBack" class="btn">← 回去</button>
        <button id="btnReset" class="btn">↺ 重切</button>
      </div>
    </div>

    <!-- MIXING SCREEN 腌制阶段 -->
    <div id="screenMix" class="screen">
      <div class="score-bar">
        <div class="score-section">拌霉豆腐</div>
        <div class="score-section">★ 完成</div>
        <div class="score-section"></div>
      </div>
      <div class="title">✦切霉豆腐✦</div>
      <div class="mix-screen">
        <div class="jar-wrap">
          <div class="jar" id="jar" data-drop-zone="jar">
            <canvas class="jar-tofu-canvas" id="jarTofuCanvas" width="156" height="168"></canvas>
            <div class="jar-noise" id="jarNoise"></div>
          </div>
        </div>
        <div class="props-row">
          <div class="prop-item" id="propChili" data-condiment="chili" draggable="true">
            <div class="prop-plate chili">
              <span class="grain"></span><span class="grain"></span><span class="grain"></span>
              <span class="grain"></span><span class="grain"></span><span class="grain"></span>
            </div>
            <span>辣椒粉</span>
          </div>
          <div class="prop-item" id="propSalt" data-condiment="salt" draggable="true">
            <div class="prop-plate salt">
              <span class="grain"></span><span class="grain"></span><span class="grain"></span>
              <span class="grain"></span><span class="grain"></span><span class="grain"></span>
            </div>
            <span>食盐</span>
          </div>
          <div class="prop-item" id="propLiquor" data-condiment="liquor" draggable="true">
            <div class="prop-bottle"></div>
            <span>白酒</span>
          </div>
        </div>
        <div class="mix-actions">
          <button id="btnShake" class="btn btn-primary">确认摇晃</button>
        </div>
      </div>
    </div>

    <!-- ENDING 结算界面 -->
    <div id="screenEnding" class="screen">
      <div class="title">✦切霉豆腐✦</div>
      <div class="ending-screen">
        <div class="ending-title">美女，你的霉豆腐好了</div>
        <div class="ending-msg">要放 15 天才能吃哦！</div>
        <div class="ending-jar-wrap">
          <canvas class="ending-jar-canvas" id="endingJarCanvas" width="140" height="148"></canvas>
        </div>
        <button id="btnRestart" class="btn btn-primary">重新开始</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- INTRO LADY DRAWING (PIXEL BY PIXEL) ----------
    (function() {
      const canvas = document.getElementById("ladyCanvas");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      function px(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
      }

      function drawLady() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // stall counter background
        px(0, 72, 64, 24, "#b37a3c");

        // shoes
        px(18, 76, 8, 4, "#2a1a08");
        px(38, 76, 8, 4, "#2a1a08");

        // dress
        px(18, 44, 28, 30, "#c0392b");
        px(18, 44, 28, 2, "#8b1b13");
        px(18, 72, 28, 2, "#8b1b13");

        // arms
        px(14, 46, 8, 14, "#f5d3b5");
        px(42, 46, 8, 14, "#f5d3b5");

        // hands
        px(12, 57, 7, 6, "#f0c5a0");
        px(45, 57, 7, 6, "#f0c5a0");

        // neck
        px(26, 38, 12, 6, "#f5d3b5");

        // face
        px(22, 22, 20, 16, "#f7d8b9");
        // hair
        px(18, 18, 28, 10, "#3b1d0e");
        px(18, 22, 4, 16, "#3b1d0e");
        px(42, 22, 4, 16, "#3b1d0e");

        // eyebrows
        px(24, 26, 6, 2, "#2a1a08");
        px(34, 26, 6, 2, "#2a1a08");
        // eyes
        px(26, 30, 3, 3, "#000");
        px(35, 30, 3, 3, "#000");
        // blush
        px(22, 34, 4, 2, "#ff9a9a");
        px(36, 34, 4, 2, "#ff9a9a");
        // mouth
        px(28, 36, 8, 2, "#8b1b13");

        // hairpin
        px(34, 20, 6, 2, "#ffc95a");
      }

      drawLady();
    })();

    // ---------- INTRO TYPEWRITER & BUTTON LOGIC ----------
    (function() {
      const speechText = document.getElementById("speechText");
      const speechButtons = document.getElementById("speechButtons");
      const btnTouch = document.getElementById("btnTouch");
      const btnBuy = document.getElementById("btnBuy");
      const swipeOverlay = document.getElementById("swipeOverlay");
      const ladyCanvas = document.getElementById("ladyCanvas");

      let typingTimer = null;
      let currentLine = "";
      let charIndex = 0;

      // 对话脚本
      const sellerLine = "要买霉豆腐吗美女？";
      const sellerScold = "哎呀不能摸不能摸！你摸了我还怎么卖呀！";

      const angryLines = [
        "喂！别乱摸！这是宝贝霉豆腐！",
        "再摸？信不信我用豆腐拍你！",
        "好了好了别摸了，买就对了！"
      ];

      let touchCount = 0;

      function typeLine(text, cb) {
        if (typingTimer) clearInterval(typingTimer);
        currentLine = text;
        charIndex = 0;
        speechText.textContent = "";
        typingTimer = setInterval(() => {
          charIndex++;
          speechText.textContent = currentLine.slice(0, charIndex);
          if (charIndex >= currentLine.length) {
            clearInterval(typingTimer);
            typingTimer = null;
            if (cb) cb();
          }
        }, 55);
      }

      function showSwipeOverlayBrief() {
        swipeOverlay.classList.add("show");
        setTimeout(() => {
          swipeOverlay.classList.remove("show");
        }, 420);
      }

      function shakeLady() {
        ladyCanvas.classList.remove("lady-shake");
        void ladyCanvas.offsetWidth;
        ladyCanvas.classList.add("lady-shake");
      }

      btnTouch.addEventListener("click", () => {
        touchCount++;
        shakeLady();
        showSwipeOverlayBrief();

        if (touchCount === 1) {
          // 第一次：老板直接制止
          typeLine(sellerScold);
          return;
        }

        const idx = Math.min(touchCount - 2, angryLines.length - 1);
        typeLine(angryLines[idx]);

        if (touchCount >= 2 + angryLines.length - 1) {
          speechButtons.innerHTML = "";
          const finalBtn = document.createElement("button");
          finalBtn.className = "btn btn-danger btn-full";
          finalBtn.textContent = "好了买买买！";
          // 最后一拍：直接进游戏，不再重复对白
          finalBtn.addEventListener("click", () => {
            document.getElementById("screenIntro").classList.remove("active");
            document.getElementById("screenGame").classList.add("active");
            initTofuGame();
          });
          speechButtons.appendChild(finalBtn);
        }
      });

      function goToGameFromIntro() {
        typeLine("好嘞！随便切！想怎么切就怎么切！", () => {
          setTimeout(() => {
            document.getElementById("screenIntro").classList.remove("active");
            document.getElementById("screenGame").classList.add("active");
            initTofuGame();
          }, 450);
        });
      }

      btnBuy.addEventListener("click", goToGameFromIntro);

      // 开场台词：只有老板一句话
      typeLine(sellerLine);
    })();

    // ---------- MAIN GAME: TOFU BOARD & CUTTING ----------
    let initTofuGame;

    (function() {
      const canvas = document.getElementById("tofuCanvas");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const popupScoreEl = document.getElementById("popupScore");
      const cutInfoEl = document.getElementById("cutInfo");
      const scoreInfoEl = document.getElementById("scoreInfo");
      const lifeInfoEl = document.getElementById("lifeInfo");
      const hintBar = document.getElementById("hintBar");

      const btnBack = document.getElementById("btnBack");
      const btnReset = document.getElementById("btnReset");
      const screenIntro = document.getElementById("screenIntro");
      const screenGame = document.getElementById("screenGame");
      const screenMix = document.getElementById("screenMix");
      const screenEnding = document.getElementById("screenEnding");
      const jar = document.getElementById("jar");
      const jarTofuCanvas = document.getElementById("jarTofuCanvas");
      const jarNoise = document.getElementById("jarNoise");
      const btnShake = document.getElementById("btnShake");
      const endingJarCanvas = document.getElementById("endingJarCanvas");
      const btnRestart = document.getElementById("btnRestart");

      // 关卡 & 网格设置
      let GRID_COLS = 4;
      let GRID_ROWS = 3;
      let TOTAL_BLOCKS = GRID_COLS * GRID_ROWS;
      let currentLevel = 1;
      const MAX_LEVEL = 10;

      let tofuRect = { x: 30, y: 40, w: 260, h: 140 };
      let blockW = tofuRect.w / GRID_COLS;
      let blockH = tofuRect.h / GRID_ROWS;

      const grooves = [];
      let score = 0;
      let cutGrooveCount = 0;
      let cutBlockCount = 0;

      // 本关计时 & 操作次数，用于评分
      let levelStartTime = 0;
      let attempts = 0;

      let lastTime = 0;
      let jarTofuBlocks = [];
      let jarCondiments = { chili: 0, salt: 0, liquor: 0 };

      function setupLevel() {
        // 10 关：前 3 关新手引导(4x3)，后 7 关逐渐增加格数，难度平滑
        if (currentLevel <= 3) {
          GRID_COLS = 4;
          GRID_ROWS = 3;
        } else {
          const extra = Math.min(currentLevel - 3, 4);
          GRID_COLS = 4 + extra;
          GRID_ROWS = 3 + Math.min(extra, 2);
        }
        TOTAL_BLOCKS = GRID_COLS * GRID_ROWS;

        tofuRect = { x: 30, y: 40, w: 260, h: 140 };
        blockW = tofuRect.w / GRID_COLS;
        blockH = tofuRect.h / GRID_ROWS;
      }

      function createGrooves() {
        grooves.length = 0;
        // 水平缝：行与行之间
        for (let r = 1; r < GRID_ROWS; r++) {
          grooves.push({
            orientation: "h",
            pos: tofuRect.y + blockH * r,
            cut: false,
            cutTime: 0
          });
        }
        // 垂直缝：列与列之间
        for (let c = 1; c < GRID_COLS; c++) {
          grooves.push({
            orientation: "v",
            pos: tofuRect.x + blockW * c,
            cut: false,
            cutTime: 0
          });
        }
      }

      const moldCanvases = [];

      // 霉豆腐顶面纹理：纯白、无明显条纹，仅轻微明暗
      function createMoldTextures() {
        moldCanvases.length = 0;
        const bw = Math.floor(blockW);
        const bh = Math.floor(blockH);

        for (let i = 0; i < TOTAL_BLOCKS; i++) {
          const off = document.createElement("canvas");
          off.width = bw;
          off.height = bh;
          const octx = off.getContext("2d");
          octx.imageSmoothingEnabled = false;

          // 纯白基底
          octx.fillStyle = "#ffffff";
          octx.fillRect(0, 0, bw, bh);

          // 顶部整体高光：从亮白过渡到稍微偏灰的白，保持干净
          const highlightGrad = octx.createLinearGradient(0, 0, 0, bh);
          highlightGrad.addColorStop(0, "rgba(255,255,255,1)");
          highlightGrad.addColorStop(0.5, "rgba(248,250,252,0.9)");
          highlightGrad.addColorStop(1, "rgba(238,240,245,0.7)");
          octx.fillStyle = highlightGrad;
          octx.fillRect(0, 0, bw, bh);

          // 底部轻微阴影，整体仍接近纯白（不要横条纹）
          const gradHeight = Math.floor(bh * 0.35);
          for (let gy = 0; gy < gradHeight; gy++) {
            const y = bh - gradHeight + gy;
            const t = gy / gradHeight;
            const alpha = 0.04 + t * 0.18;
            octx.fillStyle = `rgba(210,210,215,${alpha})`;
            octx.fillRect(0, y, bw, 1);
          }

          // 顶部边缘一点点光晕，让块更立体
          for (let rx = 0; rx < bw; rx++) {
            const edgeAlpha = 0.2;
            octx.fillStyle = `rgba(255,255,255,${edgeAlpha})`;
            octx.fillRect(rx, 0, 1, 1);
          }

          moldCanvases.push(off);
        }
      }

      function resetGameState() {
        score = 0;
        cutGrooveCount = 0;
        cutBlockCount = 0;
        attempts = 0;
        setupLevel();
        createGrooves();
        createMoldTextures();
        updateUI();
        hintBar.textContent = `第 ${currentLevel} 关：用手划过缝隙来切！`;
        levelStartTime = performance.now();
      }

      function updateUI() {
        cutInfoEl.textContent = `切了: ${cutBlockCount}/${TOTAL_BLOCKS}`;
        scoreInfoEl.textContent = `★ 第${currentLevel}关`;
        lifeInfoEl.textContent = "♥♥♥";
      }

      function drawScene(timestamp) {
        if (!lastTime) lastTime = timestamp;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.beginPath();
        ctx.ellipse(canvas.width / 2, tofuRect.y + tofuRect.h + 18, tofuRect.w * 0.7, 14, 0, 0, Math.PI * 2);
        ctx.fill();

        const topColor = "#fbfaf5";
        const sideColor = "#d8c898";
        const edgeColor = "#cbb78a";
        const depth = 10;

        ctx.fillStyle = topColor;
        ctx.fillRect(tofuRect.x, tofuRect.y, tofuRect.w, tofuRect.h);

        ctx.fillStyle = sideColor;
        ctx.beginPath();
        ctx.moveTo(tofuRect.x + tofuRect.w, tofuRect.y);
        ctx.lineTo(tofuRect.x + tofuRect.w + 10, tofuRect.y + 5);
        ctx.lineTo(tofuRect.x + tofuRect.w + 10, tofuRect.y + tofuRect.h + 5);
        ctx.lineTo(tofuRect.x + tofuRect.w, tofuRect.y + tofuRect.h);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = edgeColor;
        ctx.stroke();

        ctx.fillStyle = sideColor;
        ctx.beginPath();
        ctx.moveTo(tofuRect.x, tofuRect.y + tofuRect.h);
        ctx.lineTo(tofuRect.x + 10, tofuRect.y + tofuRect.h + 5);
        ctx.lineTo(tofuRect.x + tofuRect.w + 10, tofuRect.y + tofuRect.h + 5);
        ctx.lineTo(tofuRect.x + tofuRect.w, tofuRect.y + tofuRect.h);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = edgeColor;
        ctx.stroke();

        ctx.strokeStyle = "rgba(210,190,150,0.7)";
        for (let i = 1; i < depth; i += 3) {
          ctx.beginPath();
          ctx.moveTo(tofuRect.x + 10, tofuRect.y + tofuRect.h + 5 - i);
          ctx.lineTo(tofuRect.x + tofuRect.w + 10, tofuRect.y + tofuRect.h + 5 - i);
          ctx.stroke();
        }

        for (let row = 0; row < GRID_ROWS; row++) {
          for (let col = 0; col < GRID_COLS; col++) {
            let dx = 0;
            let dy = 0;
            const offsetAmount = 3;

            for (const g of grooves) {
              if (!g.cut) continue;
              if (g.orientation === "v") {
                const cutX = g.pos;
                const centerX = tofuRect.x + col * blockW + blockW / 2;
                if (centerX < cutX) {
                  dx -= offsetAmount;
                } else {
                  dx += offsetAmount;
                }
              } else {
                const cutY = g.pos;
                const centerY = tofuRect.y + row * blockH + blockH / 2;
                if (centerY < cutY) {
                  dy -= offsetAmount;
                } else {
                  dy += offsetAmount;
                }
              }
            }

            const bx = tofuRect.x + col * blockW + dx;
            const by = tofuRect.y + row * blockH + dy;
            const tex = moldCanvases[row * GRID_COLS + col];
            ctx.drawImage(tex, bx, by, blockW, blockH);
          }
        }

        ctx.lineWidth = 2;
        for (const g of grooves) {
          const baseColor = "#8a7040";
          const gapColor = "#4a2f10";

          const elapsed = g.cut ? (timestamp - g.cutTime) / 1000 : 0;
          const flashAlpha = g.cut && elapsed < 0.4 ? (1 - elapsed / 0.4) : 0;

          if (g.orientation === "h") {
            const y = g.pos;
            if (!g.cut) {
              ctx.strokeStyle = baseColor;
              ctx.beginPath();
              ctx.moveTo(tofuRect.x, y);
              ctx.lineTo(tofuRect.x + tofuRect.w, y);
              ctx.stroke();
            } else {
              ctx.strokeStyle = gapColor;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.moveTo(tofuRect.x - 2, y);
              ctx.lineTo(tofuRect.x + tofuRect.w + 2, y);
              ctx.stroke();
              ctx.lineWidth = 2;

              ctx.fillStyle = "#ede0b4";
              ctx.fillRect(tofuRect.x - 2, y - 3, tofuRect.w + 4, 3);
              ctx.fillStyle = "rgba(210,185,140,0.7)";
              ctx.fillRect(tofuRect.x - 2, y - 2, tofuRect.w + 4, 1);

              ctx.fillStyle = "#ede0b4";
              ctx.fillRect(tofuRect.x - 2, y, tofuRect.w + 4, 3);
              ctx.fillStyle = "rgba(210,185,140,0.7)";
              ctx.fillRect(tofuRect.x - 2, y + 1, tofuRect.w + 4, 1);
            }

            if (flashAlpha > 0) {
              ctx.strokeStyle = `rgba(255,255,255,${flashAlpha})`;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.moveTo(tofuRect.x - 4, y);
              ctx.lineTo(tofuRect.x + tofuRect.w + 4, y);
              ctx.stroke();
              ctx.lineWidth = 2;
            }
          } else {
            const x = g.pos;
            if (!g.cut) {
              ctx.strokeStyle = baseColor;
              ctx.beginPath();
              ctx.moveTo(x, tofuRect.y);
              ctx.lineTo(x, tofuRect.y + tofuRect.h);
              ctx.stroke();
            } else {
              ctx.strokeStyle = gapColor;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.moveTo(x, tofuRect.y - 2);
              ctx.lineTo(x, tofuRect.y + tofuRect.h + 2);
              ctx.stroke();
              ctx.lineWidth = 2;

              ctx.fillStyle = "#ede0b4";
              ctx.fillRect(x - 3, tofuRect.y - 2, 3, tofuRect.h + 4);
              ctx.fillStyle = "rgba(210,185,140,0.7)";
              ctx.fillRect(x - 2, tofuRect.y - 2, 1, tofuRect.h + 4);

              ctx.fillStyle = "#ede0b4";
              ctx.fillRect(x, tofuRect.y - 2, 3, tofuRect.h + 4);
              ctx.fillStyle = "rgba(210,185,140,0.7)";
              ctx.fillRect(x + 1, tofuRect.y - 2, 1, tofuRect.h + 4);
            }

            if (flashAlpha > 0) {
              ctx.strokeStyle = `rgba(255,255,255,${flashAlpha})`;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.moveTo(x, tofuRect.y - 4);
              ctx.lineTo(x, tofuRect.y + tofuRect.h + 4);
              ctx.stroke();
              ctx.lineWidth = 2;
            }
          }
        }

        requestAnimationFrame(drawScene);
      }

      let isDragging = false;
      let lastPos = null;
      function getThreshold() {
        if (currentLevel <= 3) return 14;
        if (currentLevel <= 6) return 12;
        return 10;
      }

      function getPointerPos(evt) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (evt.touches && evt.touches.length > 0) {
          clientX = evt.touches[0].clientX;
          clientY = evt.touches[0].clientY;
        } else {
          clientX = evt.clientX;
          clientY = evt.clientY;
        }
        return {
          x: ((clientX - rect.left) / rect.width) * canvas.width,
          y: ((clientY - rect.top) / rect.height) * canvas.height
        };
      }

      function distancePointToLine(px, py, orientation, pos, min, max) {
        if (orientation === "v") {
          if (py < min || py > max) return Infinity;
          return Math.abs(px - pos);
        } else {
          if (px < min || px > max) return Infinity;
          return Math.abs(py - pos);
        }
      }

      function handleMove(pos) {
        if (!lastPos) {
          lastPos = pos;
          return;
        }

        const dx = pos.x - lastPos.x;
        const dy = pos.y - lastPos.y;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        // 根据移动方向判断是“横切”还是“竖切”
        const isHorizontalSwipe = absDx > absDy;

        for (const g of grooves) {
          if (g.cut) continue;

          // 横向划，只允许切横向的缝；竖向划，只允许切竖向的缝
          if (isHorizontalSwipe && g.orientation !== "h") continue;
          if (!isHorizontalSwipe && g.orientation !== "v") continue;

          const d = distancePointToLine(
            pos.x,
            pos.y,
            g.orientation,
            g.pos,
            g.orientation === "v" ? tofuRect.y : tofuRect.x,
            g.orientation === "v" ? tofuRect.y + tofuRect.h : tofuRect.x + tofuRect.w
          );
          if (d <= getThreshold()) {
            cutGroove(g, pos);
          }
        }

        lastPos = pos;
      }

      function cutGroove(g, pos) {
        g.cut = true;
        g.cutTime = performance.now();
        cutGrooveCount++;

        const add = 15 + Math.floor(Math.random() * 11);
        score += add;

        // 按比例估算被“切开”的块数量（视觉上用）
        cutBlockCount = Math.round((cutGrooveCount / grooves.length) * TOTAL_BLOCKS);
        if (cutBlockCount > TOTAL_BLOCKS) cutBlockCount = TOTAL_BLOCKS;

        updateUI();
        showPopupScore(add, pos.x, pos.y);

        if (cutGrooveCount === grooves.length) {
          // 全部缝切完，进行本关评分
          finishLevel();
        }
      }

      function finishLevel() {
        const now = performance.now();
        const timeSec = (now - levelStartTime) / 1000;

        // 评分：越快越高，操作越少越高
        const base = 120;
        const timePenalty = timeSec * 4; // 每秒扣 4 分
        const extraAttempts = Math.max(0, attempts - grooves.length); // 超过“最少 1 次划过每条缝”的多余尝试
        const accuracyPenalty = extraAttempts * 6; // 每多一次尝试扣 6 分

        let levelScore = Math.round(base - timePenalty - accuracyPenalty);
        if (levelScore > 100) levelScore = 100;
        if (levelScore < 0) levelScore = 0;

        const passed = levelScore >= 90;

        if (passed) {
          if (currentLevel < MAX_LEVEL) {
            hintBar.textContent = `本关得分：${levelScore} 分，过关！准备进入第 ${currentLevel + 1} 关～`;
            currentLevel++;
            setTimeout(() => {
              resetGameState();
            }, 900);
          } else {
            hintBar.textContent = `本关得分：${levelScore} 分，全部 ${MAX_LEVEL} 关通关！开始拌霉豆腐～`;
            setTimeout(() => {
              startMixScene();
            }, 900);
          }
        } else {
          hintBar.textContent = `本关得分：${levelScore} 分，未过关，再试一次吧（90 分以上才可过关）`;
        }
      }

      function showPopupScore(value, x, y) {
        const rect = canvas.getBoundingClientRect();
        const innerRect = canvas.parentElement.getBoundingClientRect();

        const relX = (x / canvas.width) * rect.width + (rect.left - innerRect.left);
        const relY = (y / canvas.height) * rect.height + (rect.top - innerRect.top);

        popupScoreEl.textContent = "+" + value;
        popupScoreEl.style.left = relX + "px";
        popupScoreEl.style.top = relY + "px";
        popupScoreEl.classList.add("show");
        popupScoreEl.style.transform = "translate(-50%, -50%)";

        requestAnimationFrame(() => {
          popupScoreEl.style.transition = "transform 0.4s ease-out, opacity 0.4s ease-out";
          popupScoreEl.style.opacity = "1";
          popupScoreEl.style.transform = "translate(-50%, -90%)";
        });

        setTimeout(() => {
          popupScoreEl.style.opacity = "0";
        }, 350);
      }

      canvas.addEventListener("mousedown", (e) => {
        isDragging = true;
        attempts++;
        lastPos = getPointerPos(e);
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const pos = getPointerPos(e);
        handleMove(pos);
      });

      canvas.addEventListener("mouseup", () => {
        isDragging = false;
        lastPos = null;
      });

      canvas.addEventListener("mouseleave", () => {
        isDragging = false;
        lastPos = null;
      });

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        isDragging = true;
        attempts++;
        lastPos = getPointerPos(e);
      }, { passive: false });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (!isDragging) return;
        const pos = getPointerPos(e);
        handleMove(pos);
      }, { passive: false });

      canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        isDragging = false;
        lastPos = null;
      }, { passive: false });

      btnReset.addEventListener("click", () => {
        resetGameState();
      });

      btnBack.addEventListener("click", () => {
        screenGame.classList.remove("active");
        screenIntro.classList.add("active");
      });

      function drawJarTofu(canvasEl, noise) {
        const c = canvasEl.getContext("2d");
        const w = canvasEl.width;
        const h = canvasEl.height;
        c.imageSmoothingEnabled = false;
        c.clearRect(0, 0, w, h);

        const blockSize = 18;
        const count = 12 + Math.floor(Math.random() * 6);
        const blocks = [];
        for (let i = 0; i < count; i++) {
          blocks.push({
            x: Math.random() * (w - blockSize * 1.2),
            y: Math.random() * (h - blockSize * 1.2),
            r: (Math.random() - 0.5) * 0.3
          });
        }
        blocks.sort((a, b) => a.y - b.y);
        if (canvasEl === jarTofuCanvas) jarTofuBlocks = blocks;

        blocks.forEach(b => {
          c.save();
          c.translate(b.x + blockSize / 2, b.y + blockSize / 2);
          c.rotate(b.r);
          c.translate(-blockSize / 2, -blockSize / 2);
          c.fillStyle = "#ffffff";
          c.fillRect(0, 0, blockSize, blockSize);
          c.strokeStyle = "#e2ddcf";
          c.lineWidth = 2;
          c.strokeRect(0, 0, blockSize, blockSize);
          c.restore();
        });

        if (noise && (jarCondiments.chili > 0 || jarCondiments.salt > 0 || jarCondiments.liquor > 0)) {
          const img = c.getImageData(0, 0, w, h);
          const d = img.data;
          for (let i = 0; i < d.length; i += 4) {
            if (jarCondiments.chili > 0) {
              d[i] = Math.min(255, d[i] + 22 + Math.random() * 18);
              d[i + 1] = Math.max(0, d[i + 1] - 8);
              d[i + 2] = Math.max(0, d[i + 2] - 8);
            }
            if (jarCondiments.salt > 0) {
              const s = 12 + Math.random() * 20;
              d[i] = Math.min(255, d[i] + s);
              d[i + 1] = Math.min(255, d[i + 1] + s);
              d[i + 2] = Math.min(255, d[i + 2] + s);
            }
            if (jarCondiments.liquor > 0) {
              d[i + 2] = Math.min(255, d[i + 2] + 6 + Math.random() * 8);
            }
          }
          c.putImageData(img, 0, 0);
        }
      }

      function updateJarNoiseStyle() {
        const r = Math.min(1, jarCondiments.chili * 0.2);
        const g = Math.min(1, jarCondiments.salt * 0.15);
        const b = Math.min(1, jarCondiments.liquor * 0.2);
        jarNoise.style.background = `linear-gradient(135deg, rgba(255,${255 - g * 50},${255 - g * 50},${r * 0.25}), rgba(255,255,255,${g * 0.2}), rgba(200,220,255,${b * 0.2}))`;
        jarNoise.classList.add("visible");
      }

      function startMixScene() {
        screenGame.classList.remove("active");
        screenIntro.classList.remove("active");
        screenEnding.classList.remove("active");
        screenMix.classList.add("active");
        jarCondiments = { chili: 0, salt: 0, liquor: 0 };
        jarNoise.classList.remove("visible");
        jar.classList.remove("jar-shake");
        drawJarTofu(jarTofuCanvas, false);
      }

      [document.getElementById("propChili"), document.getElementById("propSalt"), document.getElementById("propLiquor")].forEach(prop => {
        prop.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text/plain", prop.getAttribute("data-condiment"));
          e.dataTransfer.effectAllowed = "copy";
        });
      });

      jar.addEventListener("dragover", e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "copy";
      });
      jar.addEventListener("drop", e => {
        e.preventDefault();
        const condiment = e.dataTransfer.getData("text/plain");
        if (condiment && jarCondiments[condiment] !== undefined) {
          jarCondiments[condiment]++;
          drawJarTofu(jarTofuCanvas, true);
          updateJarNoiseStyle();
        }
      });

      function handlePropTouch(prop, jarRect) {
        const condiment = prop.getAttribute("data-condiment");
        if (!condiment) return;
        jarCondiments[condiment]++;
        drawJarTofu(jarTofuCanvas, true);
        updateJarNoiseStyle();
      }

      [document.getElementById("propChili"), document.getElementById("propSalt"), document.getElementById("propLiquor")].forEach(prop => {
        prop.addEventListener("touchend", e => {
          const touch = e.changedTouches[0];
          if (!touch) return;
          const jarRect = jar.getBoundingClientRect();
          const x = touch.clientX;
          const y = touch.clientY;
          if (x >= jarRect.left && x <= jarRect.right && y >= jarRect.top && y <= jarRect.bottom) {
            e.preventDefault();
            handlePropTouch(prop, jarRect);
          }
        }, { passive: true });
      });

      btnShake.addEventListener("click", () => {
        jar.classList.add("jar-shake");
        setTimeout(() => {
          jar.classList.remove("jar-shake");
          screenMix.classList.remove("active");
          screenEnding.classList.add("active");
          drawJarTofu(endingJarCanvas, true);
        }, 2000);
      });

      btnRestart.addEventListener("click", () => {
        currentLevel = 1;
        screenEnding.classList.remove("active");
        screenIntro.classList.add("active");
      });

      initTofuGame = function() {
        resetGameState();
        lastTime = 0;
        requestAnimationFrame(drawScene);
      };
    })();
  </script>
</body>
</html>
